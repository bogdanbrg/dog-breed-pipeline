version: 2

models:
  - name: dim_breed
    description: "Dimension table with one row per breed and all descriptive attributes."
    columns:
      - name: breed_id
        description: "Primary key — unique identifier for the breed."
        tests:
          - unique
          - not_null
      - name: breed_name
        description: "Official breed name."
        tests:
          - not_null
      - name: size_class
        description: "Size classification derived from maximum weight."
        tests:
          - accepted_values:
              values: ['Toy', 'Small', 'Medium', 'Large', 'Giant', 'Unknown']

  - name: fact_weight_life_span
    description: "Fact table with numeric measurements per breed."
    columns:
      - name: breed_id
        description: "Foreign key to dim_breed."
        tests:
          - not_null
          - relationships:
              to: ref('dim_breed')
              field: breed_id

  - name: mart_breeds
    description: "Denormalised dashboard-ready table joining dim_breed and fact_weight_life_span."
    columns:
      - name: breed_id
        description: "Unique identifier for the breed."
        tests:
          - unique
          - not_null

  - name: mart_temperaments
    description: "Bridge table with one row per breed per temperament tag, split from the comma-separated temperament string."
    columns:
      - name: breed_id
        description: "Foreign key to dim_breed."
        tests:
          - not_null
      - name: temperament
        description: "Individual temperament tag e.g. Friendly, Intelligent, Loyal."
        tests:
          - not_null