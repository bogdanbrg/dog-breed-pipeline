version: 2

models:
  - name: stg_breeds
    description: "Staged and cleaned breed data from the Dog API. Deduplicated to one row per breed."
    columns:
      - name: breed_id
        description: "Unique numeric identifier for the breed."
        tests:
          - unique
          - not_null
      - name: breed_name
        description: "Official breed name."
        tests:
          - not_null
      - name: life_span_min
        description: "Minimum life span in years."
      - name: life_span_max
        description: "Maximum life span in years."
      - name: weight_kg_min
        description: "Minimum weight in kilograms."
      - name: weight_kg_max
        description: "Maximum weight in kilograms."
      - name: height_cm_min
        description: "Minimum height in centimetres."
      - name: height_cm_max
        description: "Maximum height in centimetres."
      - name: species_id
        description: "Identifier for the species group from the Dog API (e.g. 2 = domestic dog)."
      - name: breed_group
        description: "AKC breed group e.g. Herding, Hound, Sporting, Terrier, Toy, Working."
      - name: origin
        description: "Country or region where the breed was developed."
      - name: country_code
        description: "ISO 3166-1 alpha-2 country code for the breed's country of origin."
      - name: temperament
        description: "Comma-separated list of temperament traits as provided by the Dog API."
      - name: description
        description: "Short narrative description of the breed's appearance and personality."
      - name: bred_for
        description: "Historical purpose the breed was developed for. Null for most breeds in this dataset."
      - name: perfect_for
        description: "Intended owner profile or lifestyle match. Null for all breeds in this dataset."
      - name: reference_image_id
        description: "ID of the breed's reference image in the Dog API image service."
      - name: life_span_avg
        description: "Average of life_span_min and life_span_max."
      - name: weight_kg_avg
        description: "Average of weight_kg_min and weight_kg_max."
      - name: height_cm_avg
        description: "Average of height_cm_min and height_cm_max."
      - name: ingested_date
        description: "Date the record was loaded into BigQuery by the pipeline."